name: E2E (live)

# Playwright end-to-end tests hit LIVE LA County (CAMS / PAIS) and U.S. Census
# APIs, so they are network-flaky and are deliberately kept OFF the push/PR code
# gate (see ci.yml). Run them on a schedule and on demand instead, to catch
# upstream/API drift without making the code gate red for reasons unrelated to it.

on:
  workflow_dispatch:
  schedule:
    # 11:00 UTC daily (~3-4 AM LA) — a low-traffic window for the county APIs.
    - cron: '0 11 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright (live APIs)
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # playwright.config.ts's webServer builds + starts the app on :3000.
      - name: Run E2E tests
        run: npm run e2e
