name: CI

# Runs the same offline gate we run locally — typecheck → lint → unit tests →
# production build — on every push to master and every PR targeting it.
#
# Live end-to-end tests (`npm run e2e`) are intentionally NOT run here: they hit
# live LA County (CAMS / PAIS) and Census geocoding APIs and are network-flaky,
# so they would make CI red for reasons unrelated to the code. Run them locally.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A newer push to the same branch cancels an in-progress run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
